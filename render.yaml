services:
  - type: web
    name: aight-bet-api
    runtime: node
    plan: free
    buildCommand: npm install --production
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ODDS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SYNC_SPORTS
        value: americanfootball_nfl,basketball_nba,baseball_mlb,icehockey_nhl,soccer_usa_mls
      - key: PREFERRED_BOOKMAKERS
        value: fanduel,draftkings,betmgm
      - key: CACHE_TTL_MINUTES
        value: "15"
